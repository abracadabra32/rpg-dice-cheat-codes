  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{background:#2e2e2e;color:#fff;font-family:'Roboto','Noto Sans',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
    .header{padding:18px 16px 0;display:flex;justify-content:space-between;align-items:flex-start;}
    .header-title{font-size:22px;font-weight:700;}
    .header-sub{font-size:13px;color:#aaa;margin-top:1px;}
    .header-icons{display:flex;gap:2px;margin-top:4px;}
    .header-icons button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 7px;line-height:1;}
    .tabs{display:flex;margin-top:10px;border-bottom:1px solid #444;}
    .tab{flex:1;background:none;border:none;color:#777;font-size:13px;font-weight:500;letter-spacing:1.2px;padding:10px 0 9px;cursor:pointer;text-transform:uppercase;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
    .tab.active{color:#fff;font-weight:700;border-bottom:2px solid #fff;}
    #view-tabletop{display:grid;grid-template-columns:repeat(3,1fr);padding:10px 4px 100px;}
    #view-tabletop.hidden,#view-history.hidden{display:none;}
    .die-cell{display:flex;flex-direction:column;align-items:center;padding:12px 4px 10px;cursor:pointer;-webkit-user-select:none;user-select:none;}
    .die-cell:active{opacity:.55;}
    .die-cell img{width:86px;height:86px;object-fit:contain;}
    .die-cell .die-name{margin-top:5px;font-size:14px;color:#ccc;}
    .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#2e2e2e;border-top:1px solid #3a3a3a;display:flex;align-items:center;justify-content:space-evenly;padding:10px 10px 16px;z-index:20;}
    .bb-btn{width:50px;height:50px;border-radius:7px;background:#3c3c3c;border:none;color:#fff;font-size:30px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .1s;}
    .bb-btn:active{background:#505050;}
    .bb-label{font-size:16px;color:#fff;min-width:38px;text-align:center;}
    #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;pointer-events:none;opacity:0;transition:opacity .15s;}
    #overlay.show{opacity:1;pointer-events:all;}
    .overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);}
    .result-card{position:relative;z-index:1;background:#3a3a3a;border-radius:6px;padding:30px 50px 26px;text-align:center;min-width:220px;transform:scale(.88);transition:transform .22s cubic-bezier(.175,.885,.32,1.275);}
    #overlay.show .result-card{transform:scale(1);}
    .rc-formula{font-size:16px;color:#bbb;margin-bottom:4px;}
    .rc-total{font-size:88px;font-weight:700;line-height:1;color:#fff;}
    .rc-detail{font-size:14px;color:#999;margin-top:10px;}
    #view-history{padding:0 0 24px;}
    .hist-empty{text-align:center;color:#555;margin-top:60px;font-size:15px;}
    .hist-row{display:flex;align-items:center;gap:14px;border-bottom:1px solid #333;padding:12px 14px;}
    .hist-num{width:64px;height:64px;background:#333;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;flex-shrink:0;}
    .hist-info{flex:1;}
    .hist-die{font-size:16px;font-weight:600;}
    .hist-rolls{font-size:13px;color:#888;margin-top:2px;}
    .hist-time{font-size:12px;color:#555;flex-shrink:0;}
    @keyframes shake{0%{transform:rotate(0);}15%{transform:rotate(-18deg);}30%{transform:rotate(16deg);}45%{transform:rotate(-12deg);}60%{transform:rotate(10deg);}75%{transform:rotate(-6deg);}90%{transform:rotate(4deg);}100%{transform:rotate(0);}}
    .die-cell.rolling img{animation:shake .38s ease-in-out;}
  </style>
</head>

const DICE=[
  {type:"d4",  sides:4,   img:IMG_D4},
  {type:"d6",  sides:6,   img:IMG_D6},
  {type:"d8",  sides:8,   img:IMG_D8},
  {type:"d10", sides:10,  img:IMG_D10},
  {type:"d12", sides:12,  img:IMG_D12},
  {type:"d20", sides:20,  img:IMG_D20},
  {type:"d100",sides:100, img:IMG_D100},
];

const grid=document.getElementById("view-tabletop");
DICE.forEach(die=>{
  const cell=document.createElement("div");
  cell.className="die-cell";
  cell.id="cell-"+die.type;
  cell.innerHTML=`<img src="${die.img}" alt="${die.type}"><span class="die-name">${die.type}</span>`;
  cell.addEventListener("click",()=>handleRoll(die));
  grid.appendChild(cell);
});

let numDice=1, modifier=0, rolling=false, history=[], rollTimer=null;

// ── Secret combo tracker ──────────────────────────────
// Tracks sequence of +/- presses on the numDice buttons
// + = "P", - = "M"
let numSeq = [];   // sequence of "P"/"M" on num buttons (left buttons)
let modSeq = [];   // sequence of "P"/"M" on modifier buttons (right buttons)
const MAX_SEQ = 4;

function recordNum(dir) {
  numSeq.push(dir);
  if (numSeq.length > MAX_SEQ) numSeq.shift();
}
function recordMod(dir) {
  modSeq.push(dir);
  if (modSeq.length > MAX_SEQ) modSeq.shift();
}

// Returns a roll-override function or null
function getCheatMode(die) {
  const seq = numSeq.join("");
  const mseq = modSeq.join("");
  const s = die.sides;

  // ── Left buttons (num dice) ──
  // ++-- → numbers > 75% of max
  if (seq === "PPMM") return () => Math.floor(Math.random() * Math.ceil(s * 0.25)) + Math.floor(s * 0.75) + 1;
  // ---- → numbers <= 50% of max
  if (seq === "MMMM") return () => Math.floor(Math.random() * Math.floor(s * 0.5)) + 1;
  // +- → always max
  if (seq.slice(-2) === "PM") return () => s;
  // -- → always min (1)
  if (seq.slice(-2) === "MM") return () => 1;

  // ── Right buttons (modifier) ──
  // +- → numbers > 50% of max
  if (mseq.slice(-2) === "PM") return () => Math.floor(Math.random() * Math.floor(s * 0.5)) + Math.floor(s * 0.5) + 1;
  // -+ → numbers < 15% of max (very low)
  if (mseq.slice(-2) === "MP") return () => Math.max(1, Math.floor(Math.random() * Math.ceil(s * 0.15)) + 1);

  return null;
}

// ── Num/Mod controls ─────────────────────────────────
function changeNum(d) {
  numDice = Math.max(1, numDice + d);
  document.getElementById("lbl-num").textContent = numDice + "d";
  recordNum(d > 0 ? "P" : "M");
}
function changeMod(d) {
  modifier += d;
  document.getElementById("lbl-mod").textContent = (modifier >= 0 ? "+" : "") + modifier;
  recordMod(d > 0 ? "P" : "M");
}

// ── Roll logic ────────────────────────────────────────
function handleRoll(die) {
  if (rolling) return;
  rolling = true;
  const cell = document.getElementById("cell-" + die.type);
  const ov = document.getElementById("overlay");
  document.getElementById("rc-formula").textContent = numDice + die.type + (modifier !== 0 ? (modifier > 0 ? "+" + modifier : "" + modifier) : "");
  document.getElementById("rc-detail").textContent = "";
  document.getElementById("rc-total").textContent = "";
  ov.classList.add("show");

  const cheat = getCheatMode(die);

  const rollFn = cheat || (() => Math.floor(Math.random() * die.sides) + 1);
  const rolls = Array.from({length: numDice}, rollFn);
  const total = rolls.reduce((a, b) => a + b, 0) + modifier;
  document.getElementById("rc-total").textContent = total;
  const modStr = modifier !== 0 ? (modifier >= 0 ? " + " + modifier : " - " + Math.abs(modifier)) : "";
  document.getElementById("rc-detail").textContent = (numDice > 1 ? rolls.join(" + ") : rolls[0]) + modStr + (numDice > 1 || modifier !== 0 ? " = " + total : "");
  addHistory(die, rolls, total);
  rolling = false;
}

function closeOverlay() { if (!rolling) document.getElementById("overlay").classList.remove("show"); }

function clearAll() {
  history = [];
  numSeq = [];
  modSeq = [];
  renderHistory();
  document.getElementById("overlay").classList.remove("show");
}

function switchTab(t) {
  const isT = t === "tabletop";
  document.getElementById("view-tabletop").classList.toggle("hidden", !isT);
  document.getElementById("view-history").classList.toggle("hidden", isT);
  document.getElementById("bottom-bar").style.display = isT ? "flex" : "none";
  document.getElementById("tab-tabletop").classList.toggle("active", isT);
  document.getElementById("tab-history").classList.toggle("active", !isT);
}
function pad2(n) { return String(n).padStart(2, "0"); }
function fmtTime(d) { return pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds()); }
function addHistory(die, rolls, total) { history.unshift({die, rolls, total, time: new Date(), numDice, modifier}); renderHistory(); }
function renderHistory() {
  const el = document.getElementById("view-history");
  el.querySelectorAll(".hist-row").forEach(e => e.remove());
  const empty = document.getElementById("hist-empty");
  if (history.length === 0) { empty.style.display = "block"; return; }
  empty.style.display = "none";
  history.forEach(h => {
    const modStr = h.modifier !== 0 ? (h.modifier > 0 ? "+" + h.modifier : "" + h.modifier) : "";
    const div = document.createElement("div"); div.className = "hist-row";
    div.innerHTML = `<div class="hist-num">${h.total}</div><div class="hist-info"><div class="hist-die">${h.numDice}${h.die.type}${modStr}</div><div class="hist-rolls">${h.rolls.join(", ")} = ${h.total}</div></div><div class="hist-time">${fmtTime(h.time)}</div>`;
    el.appendChild(div);
  });
}
</script>
